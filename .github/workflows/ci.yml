name: CI

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Unit tests + clippy on Ubuntu 24.04 (has GTK 4.14 + libadwaita 1.5)
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 + libadwaita dev libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-4-dev libadwaita-1-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings 2>&1 || true

      - name: cargo test
        run: cargo test --workspace

  # Flatpak builds — uses Flatpak SDK container (no Rust needed)
  flatpak:
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        app: [letters-rust, tables-rust, decks-rust]
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak — org.tunaos.${{ matrix.app }}
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ${{ matrix.app }}.flatpak
          manifest-path: flatpak/org.tunaos.${{ matrix.app }}.json
          cache-key: flatpak-${{ matrix.app }}-${{ github.sha }}
