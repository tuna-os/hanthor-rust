# GUI test workflow — runs Dogtail AT-SPI tests inside a QEMU VM.
# Requires: GitHub runner with KVM support, fedora-43 cloud image.
# See docs/GUI-TESTING-SPEC.md for the full specification.

name: GUI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gui-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [letters, decks, tables]

    steps:
      - uses: actions/checkout@v4

      - name: Build binary
        run: cargo build --bin ${{ matrix.app }}

      - name: Set up QEMU VM with GNOME desktop
        run: |
          # Download Fedora cloud image
          curl -L -o /tmp/fedora.qcow2 \
            https://download.fedoraproject.org/pub/fedora/linux/releases/43/Cloud/x86_64/images/Fedora-Cloud-Base-Generic.x86_64-43.qcow2
          
          # Create VM with 8GB disk, 4GB RAM, 2 vCPUs
          qemu-img create -f qcow2 -b /tmp/fedora.qcow2 /tmp/vm.qcow2 8G
          
          # Launch VM with SSH forwarding
          qemu-system-x86_64 -enable-kvm -m 4096 -smp 2 \
            -drive file=/tmp/vm.qcow2,format=qcow2 \
            -nic user,hostfwd=tcp::10022-:22 \
            -display none -daemonize
          
          # Wait for SSH and install deps
          for i in $(seq 1 30); do
            ssh -o StrictHostKeyChecking=no -p 10022 fedora@localhost "echo ready" && break
            sleep 5
          done
          
          ssh -p 10022 fedora@localhost sudo dnf install -y \
            python3-dogtail at-spi2-atk atk at-spi2-core \
            gtk4-devel libadwaita-devel cargo

      - name: Copy binary and run tests
        run: |
          scp -P 10022 target/debug/${{ matrix.app }} fedora@localhost:/tmp/
          ssh -p 10022 fedora@localhost "
            export DISPLAY=:0
            export GDK_BACKEND=x11
            # Start Xvfb
            Xvfb :0 -screen 0 1920x1080x24 &
            sleep 1
            # Start at-spi bus
            /usr/libexec/at-spi-bus-launcher &
            sleep 1
            # Launch app
            /tmp/${{ matrix.app }} &
            APP_PID=\$!
            sleep 2
            # Run tests
            cd /workspace/gtk-office-suite/tests/gui
            python3 -m pytest test_${{ matrix.app }}.py -v --tb=short 2>&1 | tee /tmp/test-results.log
            kill \$APP_PID 2>/dev/null
          "

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.app }}
          path: /tmp/test-results.log
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.app }}
          path: tests/gui/*.png
          retention-days: 14
